<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de QR Code</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial, sans-serif; max-width:700px; margin:20px auto; padding:10px; }
h1 { text-align:center; }
label { font-weight:bold; display:block; margin-top:15px; }
input, select { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #CCC; }
button { margin-top:20px; padding:12px; width:100%; font-size:16px; background:#0d6efd; color:white; border:none; border-radius:6px; cursor:pointer; }
button:hover { background:#0b5ed7; }
#preview { margin-top:20px; padding:20px; border:1px dashed #AAA; text-align:center; }
#preview img, #preview svg { max-width:100%; height:auto; border:1px solid #ccc; }
#baixar { display:none; margin-top:10px; padding:10px; text-align:center; background:#198754; color:white; text-decoration:none; border-radius:6px; }
#baixar:hover { background:#157347; }
</style>
</head>
<body>

<h1>Gerador de QR Code - Serveless</h1>

<label>Tipo de QR Code</label>
<select id="tipo">
    <option value="URL">URL</option>
    <option value="CONTATO">Contato (vCard)</option>
    <option value="REDE">Rede Social</option>
    <option value="PIX">PIX</option>
</select>

<div id="campos"></div>

<label>Formato do arquivo</label>
<select id="formato">
    <option value="png">PNG</option>
    <option value="svg">SVG</option>
    <option value="dxf">DXF</option>
</select>

<label>Raio do espaço central (0 a 8)</label>
<input type="number" id="raio" min="0" max="8" value="0">

<button id="gerar">Gerar QR Code</button>

<div id="preview"></div>
<a id="baixar" href="#" download>Baixar QR Code</a>

<script>
const API_URL = "https://ic1mmoxkd4.execute-api.us-east-1.amazonaws.com/prod/qr"; // substitua pelo seu

const camposPorTipo = {
    "URL": [{id:"url", label:"URL"}],
    "CONTATO": [
        {id:"nome", label:"Nome"},
        {id:"telefone", label:"Telefone"},
        {id:"email", label:"Email"},
        {id:"empresa", label:"Empresa (opcional)"},
        {id:"cargo", label:"Cargo (opcional)"}
    ],
    "REDE": [
        {id:"rede", label:"Rede (instagram, facebook, linkedin, twitter/x, youtube, tiktok, whatsapp)"},
        {id:"usuario", label:"Usuário / Número"}
    ],
    "PIX": [
        {id:"chave", label:"Chave PIX"},
        {id:"nome", label:"Nome"},
        {id:"cidade", label:"Cidade"},
        {id:"valor", label:"Valor (opcional)"},
        {id:"descricao", label:"Descrição (opcional)"}
    ]
};

// Renderiza campos dinâmicos
function renderCampos() {
    const tipo = document.getElementById("tipo").value;
    const campos = camposPorTipo[tipo];
    let html = "";
    campos.forEach(c => { html += `<label>${c.label}</label><input id="${c.id}">`; });
    document.getElementById("campos").innerHTML = html;
}
renderCampos();
document.getElementById("tipo").addEventListener("change", renderCampos);

// Função principal
document.getElementById("gerar").onclick = async () => {
    const tipo = document.getElementById("tipo").value;
    const formato = document.getElementById("formato").value;
    const raio = document.getElementById("raio").value;

    const dados = {};
    camposPorTipo[tipo].forEach(c => { dados[c.id] = document.getElementById(c.id).value; });

    const payload = { tipo, dados, formato, raio_buraco: raio };

    const preview = document.getElementById("preview");
    const baixar = document.getElementById("baixar");
    preview.textContent = "Gerando...";
    baixar.style.display = "none";

    try {
        const resp = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });

        if (!resp.ok) { 
            const txt = await resp.text().catch(() => "");
            preview.innerHTML = "<b>Erro:</b> " + (txt || resp.statusText); 
            return; 
        }

        // Recebe binário direto
        const contentType = resp.headers.get("Content-Type") || "application/octet-stream";
        const arrayBuffer = await resp.arrayBuffer();
        const blob = new Blob([arrayBuffer], { type: contentType });
        const url  = URL.createObjectURL(blob);

        // Preview
        if (contentType.startsWith("image/png")) {
            preview.innerHTML = `<img src="${url}" style="max-width:300px">`;
        } else if (contentType.startsWith("image/svg+xml")) {
            const text = await blob.text();
            preview.innerHTML = text;
        } else {
            preview.innerHTML = "<p>Arquivo pronto: QR Code DXF</p>";
        }

        // Botão de download
        baixar.href = url;
        baixar.download = `qr_code.${formato}`;
        baixar.style.display = "inline-block";

    } catch(e) {
        preview.innerHTML = "<b>Erro:</b> "+e.message;
    }
};

document.getElementById("tipo").dispatchEvent(new Event("change"));
</script>

</body>
</html>
