<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator - Lambda</title>
<style>
body { font-family: Arial, sans-serif; margin: 2rem; max-width: 600px; }
input, select, textarea, button { width: 100%; padding: 0.5rem; margin: 0.5rem 0; box-sizing: border-box; }
button { cursor: pointer; }
#resultado img, #resultado svg { max-width: 100%; margin-top: 1rem; border: 1px solid #ccc; }
</style>
</head>
<body>

<h1>Gerador de QR Code (Lambda) 2121</h1>

<label for="tipo">Tipo de QR Code:</label>
<select id="tipo">
  <option value="URL">URL</option>
  <option value="CONTATO">Contato / VCard</option>
  <option value="REDE_SOCIAL">Rede Social</option>
  <option value="PIX">Pix</option>
</select>

<label for="dados">Dados (JSON):</label>
<textarea id="dados" rows="6" placeholder='Ex: {"url":"https://example.com"}'></textarea>

<label for="formato">Formato:</label>
<select id="formato">
  <option value="png">PNG</option>
  <option value="svg">SVG</option>
</select>

<label for="raio">Raio do buraco central:</label>
<input type="number" id="raio" value="0" min="0" max="10">

<button id="gerar">Gerar QR Code</button>

<div id="resultado"></div>

<script>
const API_URL = "https://<SEU_API_ID>.execute-api.us-east-1.amazonaws.com/prod/qr";

document.getElementById("gerar").addEventListener("click", async () => {
  const tipo = document.getElementById("tipo").value;
  let dadosText = document.getElementById("dados").value;
  let dados;
  try { dados = JSON.parse(dadosText || "{}"); } 
  catch(e) { alert("JSON inválido"); return; }

  const formato = document.getElementById("formato").value;
  const raio = parseInt(document.getElementById("raio").value) || 0;

  const payload = { tipo, dados, formato, raio_buraco: raio };

  try {
    const resp = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!resp.ok) throw new Error("Erro ao gerar QR code");

    // Parse do JSON retornado pelo Lambda Proxy
    const json = await resp.json();

    if (json.error) throw new Error(json.error);

    const base64Body = json.body;
    const resultadoDiv = document.getElementById("resultado");
    resultadoDiv.innerHTML = "";

    if (formato === "svg") {
      // SVG: decodifica base64 para string e insere no DOM
      const svgText = atob(base64Body);
      resultadoDiv.innerHTML = svgText;
    } else {
      // PNG / outros: cria Data URL
      const img = document.createElement("img");
      img.src = `data:image/png;base64,${base64Body}`;
      resultadoDiv.appendChild(img);
    }

  } catch(e) {
    alert("Erro: " + e.message);
  }
});
</script>

</body>
</html>
